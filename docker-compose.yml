version: "3.9"

services:
  # ──────────────────────────────────────────
  # NGINX — Reverse Proxy + Static + HLS
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: manuals_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/uploads:/var/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - manuals_net

  # ──────────────────────────────────────────
  # BACKEND — Fastify + Node.js 20
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: manuals_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: ${MEILISEARCH_MASTER_KEY}
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - ./backend/prisma:/app/prisma
    ports:
      - "3001:3001"   # API
      - "3002:3002"   # WebSocket
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - manuals_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────
  # FRONTEND — React + Vite
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: manuals_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "5173:5173"
    networks:
      - manuals_net

  # ──────────────────────────────────────────
  # POSTGRESQL 16
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: manuals_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-manuals_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
      POSTGRES_DB: ${POSTGRES_DB:-manuals_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - manuals_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-manuals_user} -d ${POSTGRES_DB:-manuals_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # REDIS 7 — Cache + Queue + Sessions
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: manuals_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme_redis}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - manuals_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # MEILISEARCH — Full-text Search
  # ──────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: manuals_search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:-changeme_meili_key}
      MEILI_ENV: development
      MEILI_DB_PATH: /meili_data
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    networks:
      - manuals_net

  # ──────────────────────────────────────────
  # OLLAMA — LLM Self-hosted (opcional)
  # ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: manuals_ollama
    restart: unless-stopped
    profiles:
      - ai-local
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - manuals_net
    # Para GPU NVIDIA, descomentar:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  ollama_data:
    driver: local

networks:
  manuals_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
