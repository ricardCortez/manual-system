# ═══════════════════════════════════════════════════════
# NGINX — Reverse Proxy para Manual del Sistema
# Soporte HLS streaming + WebSocket + SSL interno
# ═══════════════════════════════════════════════════════

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Mapa para soporte WebSocket (HMR + Socket.io)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types         text/plain text/css text/xml text/javascript
                       application/json application/javascript
                       application/xml+rss application/atom+xml
                       image/svg+xml;

    # Buffers para uploads grandes
    client_max_body_size    2100M;
    client_body_buffer_size 128k;
    proxy_read_timeout      300s;
    proxy_send_timeout      300s;
    proxy_connect_timeout   60s;

    # Headers de seguridad comunes
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────────────
    # Upstream services
    # ──────────────────────────────────────────────────
    # Rate limiting (debe estar en contexto http)
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;

    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    upstream frontend {
        server frontend:5173;   # Dev; en prod sirve estáticos directamente
    }

    # ──────────────────────────────────────────────────
    # Redirect HTTP → HTTPS
    # ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ──────────────────────────────────────────────────
    # HTTPS — Servidor principal
    # ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name manuals.empresa.local;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:MozSSL:10m;

        # ── Health check (backend) ────────────────────
        location = /health {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Connection        "";
        }

        # ── Upload de chunks — sin rate limit de nginx ────
        # El backend gestiona su propio límite (600 req/10min por usuario).
        # Los uploads en chunks generan muchas peticiones rápidas legítimas.
        location ~ ^/api/v1/documents/[^/]+/upload(-chunk)?$ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── API REST ──────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Rate limiting por IP — burst alto para no bloquear operaciones legítimas
            limit_req zone=api burst=50 nodelay;
        }

        # ── WebSocket (Socket.io) ──────────────────────
        location /socket.io/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;   # Conexiones WebSocket longas
            proxy_send_timeout 86400s;
        }

        # ── HLS Streaming — Optimizado ─────────────────
        location /uploads/videos/hls/ {
            alias  /var/uploads/videos/hls/;

            # Headers para streaming adaptativo
            add_header Cache-Control        "no-cache";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Expose-Headers "Content-Length";

            # Segmentos .ts pueden cachearse más tiempo
            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=86400";
            }

            # Playlists .m3u8 no cachear (cambian)
            location ~* \.m3u8$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # ── PDF.js worker — MIME type explícito para .mjs ─
        location = /uploads/pdf.worker.min.mjs {
            alias  /var/uploads/pdf.worker.min.mjs;
            default_type application/javascript;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Thumbnails y documentos ───────────────────
        location /uploads/ {
            alias  /var/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            autoindex off;

            # Denegar archivos ocultos
            location ~ /\. {
                deny all;
            }
        }

        # ── Swagger UI ────────────────────────────────
        location /api/docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Bull Board (admin) ────────────────────────
        location /admin/queues {
            # Proteger con auth básica adicional en producción
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # ── Vite HMR WebSocket (dev) ──────────────────
        location = / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
        }

        # ── Frontend React (SPA) ──────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   Connection "";
        }
    }
}
